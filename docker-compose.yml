version: '3.9'

services:

  # ── PostgreSQL ──────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: loansystem_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       loansystem
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ─────────────────────────────────────
  backend:
    build: ./backend
    container_name: loansystem_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL:    postgresql://postgres:${DB_PASSWORD:-postgres123}@db:5432/loansystem
      JWT_SECRET:      ${JWT_SECRET:-mude-esta-chave-em-producao-12345}
      JWT_EXPIRES_IN:  7d
      PORT:            3001
      NODE_ENV:        production
      FRONTEND_URL:    ${FRONTEND_URL:-http://localhost}
      UPLOAD_DIR:      uploads
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    container_name: loansystem_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  uploads_data:
